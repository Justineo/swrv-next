packages:
  - packages/swrv
  - packages/site

catalog:
  "@playwright/test": 1.60.0
  "@types/node": 24.12.4
  "@vue/server-renderer": 3.5.34
  bumpp: 11.1.0
  dequal: 2.0.3
  esbuild: 0.28.0
  jsdom: 29.1.1
  oxc-minify: 0.130.0
  typescript: 6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: 0.1.20
  vitepress: 2.0.0-alpha.17
  vitepress-plugin-npm-commands: 0.10.0
  vitepress-plugin-tabs: 0.9.0
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue: 3.5.34

catalogMode: prefer
allowBuilds:
  esbuild: true
overrides:
  vue: "catalog:"
  "@vue/server-renderer": "catalog:"
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
