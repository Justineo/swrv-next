name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vite+
        run: npm install --global vite-plus

      - name: Install dependencies
        run: vp install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        run: vp exec bumpp --all --recursive --commit --tag --push --yes --release ${{ github.event.inputs.release_type }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install Vite+
        run: npm install --global vite-plus

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Validate
        run: |
          vp check
          vp run test -r
          vp exec playwright test
          vp run build -r

      - name: Package dry-run
        working-directory: packages/swrv
        run: vp pm pack -- --json --dry-run

      - name: Publish dry-run
        working-directory: packages/swrv
        run: vp pm publish -- --dry-run --access public --provenance --no-git-checks --tag next

      - name: Publish package
        working-directory: packages/swrv
        run: vp pm publish -- --access public --provenance --no-git-checks --tag next

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
