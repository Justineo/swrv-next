name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vite+
        run: npm install --global vite-plus

      - name: Install dependencies
        run: vp install

      - name: Check
        run: vp check

      - name: Test
        run: vp run test -r

      - name: Build
        run: vp run build -r

      - name: Package dry-run
        working-directory: packages/swrv
        run: vp pm pack -- --json --dry-run
