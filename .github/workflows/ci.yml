name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Check
        run: vp check

      - name: Test
        run: vp run test -r

      - name: Browser E2E
        run: vp exec playwright test

      - name: Build
        run: vp run build -r

      - name: Package dry-run
        working-directory: packages/swrv
        run: vp pm pack -- --json --dry-run
